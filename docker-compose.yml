# 使用说明见 README「Docker 部署」
# 复制 config/env.example 为 .env 并填入密钥后再启动

services:
  bot:
    build: .
    image: ai-trading-bot:latest
    container_name: ai-trading-bot
    command: ["python", "src/main.py"]
    env_file:
      - .env
    environment:
      - BOT_LOG_PATH=/app/logs/bot.log
    volumes:
      - ./logs:/app/logs
      # 宿主机改配置可立即生效（可选）
      - ./config:/app/config:ro
    read_only: true
    tmpfs:
      - /tmp
      - /app/tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      test: ["CMD", "python", "-c", "import os,time,sys; p='/app/logs/bot.log'; sys.exit(0 if os.path.exists(p) and (time.time()-os.path.getmtime(p)<900) else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    networks:
      - trading

  dashboard:
    build: .
    image: ai-trading-bot:latest
    container_name: ai-trading-dashboard
    command: ["python", "run_dashboard.py", "--host", "0.0.0.0", "--port", "5000"]
    env_file:
      - .env
    environment:
      - BOT_LOG_PATH=/app/logs/bot.log
    ports:
      - "${DASHBOARD_PUBLISH_PORT:-5000}:5000"
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config:ro
    read_only: true
    tmpfs:
      - /tmp
      - /app/tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - trading
    depends_on:
      bot:
        condition: service_healthy

networks:
  trading:
    driver: bridge
